name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libsqlite3-dev

      - name: Install Koka (Unix)
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Hica
        run: |
          curl -fsSL https://www.hica.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify tools
        run: |
          koka --version
          hica --version

      - name: Run tests
        run: |
          set +e
          failed=0
          for f in tests/test_*.hc; do
            echo "=== $f ==="
            output=$(hica test "$f" 2>&1)
            echo "$output"
            if echo "$output" | grep -q 'failed'; then
              failed=1
            fi
          done
          exit $failed

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

